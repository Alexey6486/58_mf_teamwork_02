events {
    worker_connections 1024;
}

http {
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Базовые заголовки безопасности
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # server {
    #     listen 3000;
    #     listen [::]:3000;
    #     server_name 46.243.211.198;
    # }

    upstream client_upstream {
        server client:3000;
    }

    upstream server_upstream {
        server server:3001;
    }

    server {
        listen 80;
        # listen [::]:80;
        # server_name 46.243.211.198;

        # Эндпоинт для ping-проверки
        location = /ping {
            access_log off;
            return 200 "pong\n";
            add_header Content-Type text/plain;
        }

       # Запросы к /api/v1 перенаправляются на сервис на порту 3001
       location /api/v1/ {
           proxy_pass http://server_upstream/api/v1/;
           proxy_set_header Host $host;
           proxy_set_header X-Real-IP $remote_addr;
           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
           proxy_set_header X-Forwarded-Proto $scheme;
           proxy_set_header Cache-Control no-cache;

           # Удаляем дублирование /api/v1 в пути
           # rewrite ^/api/v1/(.*)$ /$1 break;
       }

       # Запросы к /api/v2 перенаправляются на внешний API
       location /api/v2/ {
           proxy_pass https://ya-praktikum.tech/api/v2/;
           proxy_set_header Host ya-praktikum.tech;
           proxy_set_header X-Real-IP $remote_addr;
           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
           proxy_set_header X-Forwarded-Proto $scheme;
           proxy_set_header Cache-Control no-cache;

           # Удаляем дублирование /api/v2 в пути
           # rewrite ^/api/v2/(.*)$ /$1 break;

           # Дополнительные настройки для отладки
           proxy_connect_timeout 30s;
           proxy_send_timeout 30s;
           proxy_read_timeout 30s;
       }

        location / {
            proxy_pass http://client_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
